

<style>


/* styles.css */
.slider-container {
    width: 50%;
    margin: 0 auto;
    text-align: center;
}

input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 10px;
    background: #ddd;
    outline: none;
    opacity: 0.7;
    transition: opacity .2s;
}

input[type="range"]:hover {
    opacity: 1;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 25px;
    height: 25px;
    background: #4CAF50;
    cursor: pointer;
}

input[type="range"]::-moz-range-thumb {
    width: 25px;
    height: 25px;
    background: #4CAF50;
    cursor: pointer;
}



input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 10px;
    background: linear-gradient(to right, #4CAF50 0%, #4CAF50 var(--value), #ddd var(--value), #ddd 100%);
    outline: none;
    opacity: 0.7;
    transition: opacity .2s;
}
    </style>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Range Example</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="slider-container">
        <input type="range" id="minRange" min="0" max="100" value="20">
        <input type="range" id="maxRange" min="0" max="100" value="80">
        <p>Range: <span id="minValue">20</span> - <span id="maxValue">80</span></p>
    </div>
    <script src="script.js"></script>
</body>
</html>




<script>
    const minRange = document.getElementById('minRange');
const maxRange = document.getElementById('maxRange');
const minValue = document.getElementById('minValue');
const maxValue = document.getElementById('maxValue');

minRange.addEventListener('input', function() {
    minValue.textContent = this.value;
});

maxRange.addEventListener('input', function() {
    maxValue.textContent = this.value;
});

/* script.js */
const rangeInput = document.getElementById('myRange');
const rangeValue = document.getElementById('rangeValue');

rangeInput.addEventListener('input', function() {
    this.style.setProperty('--value', this.value + '%');
    rangeValue.textContent = this.value;
});


</script>
